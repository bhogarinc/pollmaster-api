version: '3.8'

services:
  api:
    build: .
    container_name: pollmaster-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pollmaster
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app  # Hot reload in development
    restart: unless-stopped
    networks:
      - pollmaster-network

  db:
    image: postgres:16-alpine
    container_name: pollmaster-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pollmaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pollmaster-network

  redis:
    image: redis:7-alpine
    container_name: pollmaster-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pollmaster-network

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: pollmaster-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - pollmaster-network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  pollmaster-network:
    driver: bridge
